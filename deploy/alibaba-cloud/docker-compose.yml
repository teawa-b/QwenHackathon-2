services:
  supplyswarm:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: supplyswarm:alibaba-cloud
    container_name: supplyswarm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8787
      NODE_ENV: production
      DEPLOYMENT_PROVIDER: Alibaba Cloud ECS/SAS
      DEPLOYMENT_REGION: ${ALIBABA_CLOUD_REGION:-ap-southeast-1}
      DEPLOYMENT_COMMIT: ${DEPLOYMENT_COMMIT:-main}
    expose:
      - "8787"
    volumes:
      - swarm-memory:/app/server/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: supplyswarm-caddy
    restart: unless-stopped
    depends_on:
      supplyswarm:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  swarm-memory:
  caddy-data:
  caddy-config:
